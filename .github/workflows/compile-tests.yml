name: Compilation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CMAKE_FLAGS: -DSDL_UNIX_CONSOLE_BUILD=ON
  DEPS_CACHE_VERSION: v1

jobs:
  build-linux:
    name: Build with ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler }} ccache cmake ninja-build libdrm-dev libgbm-dev libfreetype6-dev libharfbuzz-dev nasm

      - name: Cache dependency builds
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/engine/build/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-ninja-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('engine/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-ninja-deps-${{ env.DEPS_CACHE_VERSION }}-

      - name: Cache compiler outputs
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.compiler }}-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-ccache-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compiler_check=content
          ccache --set-config=sloppiness=time_macros,include_file_mtime,include_file_ctime
          ccache --zero-stats

      - name: Configure with CMake
        run: |
          mkdir -p ${{ github.workspace }}/engine/build
          cd ${{ github.workspace }}/engine/build
          CC=${{ matrix.cc }} cmake -G Ninja ${{ env.CMAKE_FLAGS }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ..

      - name: Build
        run: |
          cd ${{ github.workspace }}/engine/build
          cmake --build . --parallel

      - name: Show ccache stats
        run: ccache --show-stats

  build-msvc:
    name: Build with MSVC
    runs-on: windows-2025
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERTYPE: msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache dependency builds
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/engine/build/_deps
          key: windows-msvc-ninja-deps-${{ env.DEPS_CACHE_VERSION }}-${{ hashFiles('engine/CMakeLists.txt') }}
          restore-keys: |
            windows-msvc-ninja-deps-${{ env.DEPS_CACHE_VERSION }}-
            
      - uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Install build tools with Chocolatey
        run: choco install pkgconfiglite ccache ninja -y --no-progress

      - name: Set up NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache compiler outputs
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: windows-msvc-ccache-${{ github.run_id }}
          restore-keys: |
            windows-msvc-ccache-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compiler_check=content
          ccache --set-config=sloppiness=time_macros,include_file_mtime,include_file_ctime
          ccache --zero-stats

      - name: Configure with CMake
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\engine\build"
          cd ${{ github.workspace }}\engine\build
          cmake -G Ninja ${{ env.CMAKE_FLAGS }} -DCMAKE_BUILD_TYPE=Debug -DCMAKE_POLICY_DEFAULT_CMP0141=NEW -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -DCMAKE_ASM_NASM_COMPILER=nasm -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ..
        
      - name: Build with MSVC
        run: |
          cd ${{ github.workspace }}\engine\build
          cmake --build . --parallel

      - name: Show ccache stats
        run: ccache --show-stats
